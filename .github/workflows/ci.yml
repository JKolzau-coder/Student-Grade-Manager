name: CI

on:
  push:
    branches:
      - main
      - 'feat/**'
      - 'dev/**'
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      reason:
        description: 'Grund für manuellen Start'
        required: false
        default: 'Manueller Testlauf'

permissions:
  contents: read
  checks: write
  packages: write

jobs:
  compile:
    name: Compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Compile
        run: mvn compile -pl student-grade-manager-core -q
      - name: Upload compiled classes
        uses: actions/upload-artifact@v4
        with:
          name: compiled-classes
          path: student-grade-manager-core/target/

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: compile
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Run tests
        run: mvn test -pl student-grade-manager-core
      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: JUnit Test Results
          path: '**/surefire-reports/TEST-*.xml'
          reporter: java-junit
      - name: Upload JaCoCo report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: student-grade-manager-core/target/site/jacoco/
      - name: Coverage summary
        if: always()
        run: |
          XML=student-grade-manager-core/target/site/jacoco/jacoco.xml
          if [ -f "$XML" ]; then
            INSTR_MISSED=$(grep -o 'type="INSTRUCTION"[^/]*/>' "$XML" | grep -o 'missed="[0-9]*"' | grep -o '[0-9]*' | head -1)
            INSTR_COVERED=$(grep -o 'type="INSTRUCTION"[^/]*/>' "$XML" | grep -o 'covered="[0-9]*"' | grep -o '[0-9]*' | head -1)
            TOTAL=$((INSTR_MISSED + INSTR_COVERED))
            PCT=$(awk "BEGIN {printf \"%.0f\", ($INSTR_COVERED / $TOTAL) * 100}")
            echo "## JaCoCo Coverage: ${PCT}%" >> $GITHUB_STEP_SUMMARY
            echo "| Metrik | Wert |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|------|" >> $GITHUB_STEP_SUMMARY
            echo "| Instructions covered | ${INSTR_COVERED} / ${TOTAL} |" >> $GITHUB_STEP_SUMMARY
            echo "| Coverage | **${PCT}%** |" >> $GITHUB_STEP_SUMMARY
          fi

  checkstyle:
    name: Checkstyle
    runs-on: ubuntu-latest
    needs: compile
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Run Checkstyle
        run: mvn checkstyle:check -pl student-grade-manager-core

  pmd:
    name: PMD
    runs-on: ubuntu-latest
    needs: compile
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Run PMD
        run: mvn pmd:check -pl student-grade-manager-core

  spotbugs:
    name: SpotBugs
    runs-on: ubuntu-latest
    needs: compile
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Run SpotBugs
        run: mvn spotbugs:check -pl student-grade-manager-core

  security:
    name: CVE Scan (OSV)
    runs-on: ubuntu-latest
    needs: compile
    steps:
      - uses: actions/checkout@v4
      - uses: google/osv-scanner-action@v2.0.2
        with:
          scan-args: |-
            --recursive
            .

  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [test, checkstyle, pmd, spotbugs, security]
    if: success()
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Build JAR
        run: mvn package -pl student-grade-manager-core -q
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: student-grade-manager-core
          push: ${{ startsWith(github.ref_name, 'dev/') }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/student-grade-manager:latest
            ghcr.io/${{ github.repository_owner }}/student-grade-manager:${{ github.sha }}

  build-fixer:
    name: Auto-Fix
    runs-on: ubuntu-latest
    needs: [compile, test, checkstyle, pmd, spotbugs]
    if: failure()
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Claude CLI
        run: npm install -g @anthropic-ai/claude-code
      - name: Run build-agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: java scripts/BuildWrapper.java
      - name: Commit and push fixes
        run: |
          git config user.name "build-fixer[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet; then
            git add student-grade-manager-core/src/
            git commit -m "fix(auto): resolve build gate violations [skip ci]"
            git push
          fi
