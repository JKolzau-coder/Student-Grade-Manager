name: CI

on:
  push:
    branches:
      - main
      - 'feat/**'
      - 'dev/**'
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      reason:
        description: 'Grund für manuellen Start'
        required: false
        default: 'Manueller Testlauf'
      test:
        description: 'Einzelner Test (leer = alle, z.B. DependencyCveTest)'
        required: false
        default: ''

permissions:
  contents: read
  checks: write
  packages: write

jobs:
  compile:
    name: Compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Compile
        run: mvn compile -pl student-grade-manager-core -q
      - name: Upload compiled classes
        uses: actions/upload-artifact@v4
        with:
          name: compiled-classes
          path: student-grade-manager-core/target/

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: compile
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Run tests
        run: |
          FILTER="${{ github.event.inputs.test }}"
          if [ -n "$FILTER" ]; then
            mvn test -pl student-grade-manager-core -Dtest="$FILTER"
          else
            mvn test -pl student-grade-manager-core
          fi
      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: JUnit Test Results
          path: '**/surefire-reports/TEST-*.xml'
          reporter: java-junit
      - name: Upload JaCoCo report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: student-grade-manager-core/target/site/jacoco/
      - name: Coverage summary
        if: always()
        run: |
          XML=student-grade-manager-core/target/site/jacoco/jacoco.xml
          if [ -f "$XML" ]; then
            INSTR_MISSED=$(grep -o 'type="INSTRUCTION"[^/]*/>' "$XML" | grep -o 'missed="[0-9]*"' | grep -o '[0-9]*' | head -1)
            INSTR_COVERED=$(grep -o 'type="INSTRUCTION"[^/]*/>' "$XML" | grep -o 'covered="[0-9]*"' | grep -o '[0-9]*' | head -1)
            TOTAL=$((INSTR_MISSED + INSTR_COVERED))
            PCT=$(awk "BEGIN {printf \"%.0f\", ($INSTR_COVERED / $TOTAL) * 100}")
            echo "## JaCoCo Coverage: ${PCT}%" >> $GITHUB_STEP_SUMMARY
            echo "| Metrik | Wert |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|------|" >> $GITHUB_STEP_SUMMARY
            echo "| Instructions covered | ${INSTR_COVERED} / ${TOTAL} |" >> $GITHUB_STEP_SUMMARY
            echo "| Coverage | **${PCT}%** |" >> $GITHUB_STEP_SUMMARY
          fi

  checkstyle:
    name: Checkstyle
    runs-on: ubuntu-latest
    needs: compile
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Run Checkstyle
        run: mvn checkstyle:check -pl student-grade-manager-core

  pmd:
    name: PMD
    runs-on: ubuntu-latest
    needs: compile
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Run PMD
        run: mvn pmd:check -pl student-grade-manager-core

  spotbugs:
    name: SpotBugs
    runs-on: ubuntu-latest
    needs: compile
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Run SpotBugs
        run: mvn spotbugs:check -pl student-grade-manager-core

  security:
    name: CVE Scan (Trivy)
    runs-on: ubuntu-latest
    needs: compile
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Populate Maven cache
        run: mvn install -N -q && mvn dependency:resolve -pl student-grade-manager-core -q
      - name: Run Trivy vulnerability scanner
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin
          trivy fs --exit-code 1 --ignore-unfixed --pkg-types library --severity CRITICAL,HIGH .

  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [test, checkstyle, pmd, spotbugs, security]
    if: success()
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Build JAR
        run: mvn package -pl student-grade-manager-core -q
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Lowercase owner for Docker tag
        run: echo "OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: student-grade-manager-core/Dockerfile
          push: ${{ startsWith(github.ref_name, 'dev/') }}
          tags: |
            ghcr.io/${{ env.OWNER }}/student-grade-manager:latest
            ghcr.io/${{ env.OWNER }}/student-grade-manager:${{ github.sha }}

  build-fixer:
    name: Auto-Fix
    runs-on: ubuntu-latest
    needs: [compile, test, checkstyle, pmd, spotbugs]
    if: failure() && !startsWith(github.ref_name, 'fix/')
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Claude CLI
        run: npm install -g @anthropic-ai/claude-code
      - name: Run build-agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: java scripts/BuildWrapper.java
      - name: Open PR with fix
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "build-fixer[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No changes — BuildWrapper produced no fix."
            exit 0
          fi
          GATE="unknown"
          if [ "${{ needs.compile.result }}"    = "failure" ]; then GATE="compile";    fi
          if [ "${{ needs.test.result }}"       = "failure" ]; then GATE="test";       fi
          if [ "${{ needs.checkstyle.result }}" = "failure" ]; then GATE="checkstyle"; fi
          if [ "${{ needs.pmd.result }}"        = "failure" ]; then GATE="pmd";        fi
          if [ "${{ needs.spotbugs.result }}"   = "failure" ]; then GATE="spotbugs";   fi
          BASE="${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}"
          BRANCH="fix/${GATE}-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git add student-grade-manager-core/src/ pom.xml student-grade-manager-core/pom.xml
          git commit -m "fix(auto): resolve ${GATE} gate violations"
          git push -u origin "$BRANCH"
          gh pr create \
            --title "auto: fix ${GATE} gate" \
            --body "$(cat <<'EOF'
          BuildAgent applied this fix. All gates passed on retry.

          **Review checklist before merging:**
          - [ ] Diff is minimal — no unrelated changes
          - [ ] Fix addresses root cause, not just the symptom
          - [ ] No new logic introduced without a test
          EOF
          )" \
            --base "$BASE"
